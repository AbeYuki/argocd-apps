apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "immich.mlConfigName" . }}
  labels:
    {{- include "immich.labelsWithComponent" (dict "component" "immich-ml" "context" .) | nindent 4 }}
data:
{{- range $key, $val := .Values.machineLearning.config }}
  {{ $key }}: {{ $val | quote }}
{{- end }}
