apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "immich.mlName" . }}
  labels:
    {{- include "immich.labelsWithComponent" (dict "component" "immich-ml" "context" .) | nindent 4 }}
spec:
  replicas: {{ .Values.machineLearning.replicaCount }}
  selector:
    matchLabels:
      {{- include "immich.selectorLabelsWithComponent" (dict "component" "immich-ml" "context" .) | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/ml-configmap.yaml") . | sha256sum }}
        {{- with .Values.machineLearning.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "immich.labelsWithComponent" (dict "component" "immich-ml" "context" .) | nindent 8 }}
        {{- with .Values.machineLearning.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.machineLearning.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "immich.serviceAccountName" . }}
      {{- with .Values.machineLearning.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "immich.mlName" . }}
          {{- with .Values.machineLearning.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.machineLearning.image.repository }}:{{ .Values.machineLearning.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.machineLearning.image.pullPolicy }}
          resources:
            {{- toYaml .Values.machineLearning.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "immich.mlConfigName" . }}
          volumeMounts:
            - name: model-cache
              mountPath: /cache
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: {{ .Values.machineLearning.persistence.existingClaim | default (include "immich.modelCachePvcName" .) | quote }}
      {{- with .Values.machineLearning.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.machineLearning.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.machineLearning.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
