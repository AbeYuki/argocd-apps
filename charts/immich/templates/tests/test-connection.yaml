{{- if .Values.test.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "immich.fullname" . }}-test-connection"
  labels:
    {{- include "immich.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: {{ .Values.test.image }}
      command:
        - wget
      args:
        - "{{ include "immich.serverWorkloadName" . }}:{{ .Values.server.service.port }}"
  restartPolicy: Never
{{- end }}
