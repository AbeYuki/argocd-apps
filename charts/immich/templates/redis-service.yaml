apiVersion: v1
kind: Service
metadata:
  name: {{ include "immich.redisName" . }}
  labels:
    {{- include "immich.labelsWithComponent" (dict "component" "redis" "context" .) | nindent 4 }}
spec:
  type: {{ .Values.redis.service.type }}
  selector:
    {{- include "immich.selectorLabelsWithComponent" (dict "component" "redis" "context" .) | nindent 4 }}
  ports:
    - protocol: TCP
      port: {{ .Values.redis.service.port }}
      targetPort: {{ .Values.redis.service.targetPort }}
