apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "immich.serverConfigName" . }}
  labels:
    {{- include "immich.labelsWithComponent" (dict "component" "server" "context" .) | nindent 4 }}
data:
{{- $serverConfig := .Values.server.config | default dict }}
{{- $configKeys := keys (omit $serverConfig "DB_HOSTNAME" "REDIS_HOSTNAME" "REDIS_PORT") | sortAlpha }}
{{- range $key := $configKeys }}
  {{ $key }}: {{ index $serverConfig $key | quote }}
{{- end }}
  DB_HOSTNAME: {{ (index $serverConfig "DB_HOSTNAME" | default (include "immich.postgresName" .)) | quote }}
  REDIS_HOSTNAME: {{ (index $serverConfig "REDIS_HOSTNAME" | default (include "immich.redisName" .)) | quote }}
  REDIS_PORT: {{ (index $serverConfig "REDIS_PORT" | default .Values.redis.service.port) | quote }}
