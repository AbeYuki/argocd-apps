# テスト用設定
test:
  enabled: false
  image: busybox
  timeoutSeconds: 1200  # 20分
  service:
    port: 80

cron:  
  # This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
  replicaCount: 1
  # nextcloud コンテナと同じイメージを使用するため、image セクションは定義しません。
  # This is to override the chart name.
  nameOverride: ""
  fullnameOverride: ""

  # This is for setting Kubernetes Annotations to a Pod.
  # For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
  podAnnotations: {}
  # This is for setting Kubernetes Labels to a Pod.
  # For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
  podLabels: {}

  podSecurityContext:
    fsGroup: 33

  securityContext: {}
    # capabilities:
    #   drop:
    #   - ALL
    # readOnlyRootFilesystem: true
    # runAsNonRoot: true
    # runAsUser: 1000

  resources: {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

  # This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
  livenessProbe: {}
    #httpGet:
    #  path: /
    #  port: http
  readinessProbe: {}
    #httpGet:
    #  path: /
    #  port: http
    #  port: http

  # This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80



  nodeSelector: {}

  tolerations: []

  affinity: {}

db:
  persistentVolumeClaim:
    # storageClassName: 必須。使用するStorageClass名を指定してください（例: standard）
    storageClassName: standard
    accessModes:
      - ReadWriteOnce
    size: 1Gi

  secret:
    MARIADB_ROOT_PASSWORD: "nextcloud"
    MARIADB_PASSWORD: "nextcloud"
    MARIADB_DATABASE: "nextcloud"
    MARIADB_USER: "nextcloud"

  # This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
  replicaCount: 1

  # This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
  image:
    repository: mariadb
    # This sets the pull policy for images.
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: "10.11.18"

  args:
    - --transaction-isolation=READ-COMMITTED
    - --log-bin=binlog
    - --binlog-format=ROW

  # This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
  imagePullSecrets: []
  # This is to override the chart name.
  nameOverride: ""
  fullnameOverride: ""

  # This is for setting Kubernetes Annotations to a Pod.
  # For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
  podAnnotations: {}
  # This is for setting Kubernetes Labels to a Pod.
  # For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
  podLabels: {}

  podSecurityContext: {}
    # fsGroup: 2000

  securityContext: {}
    # capabilities:
    #   drop:
    #   - ALL
    # readOnlyRootFilesystem: true
    # runAsNonRoot: true
    # runAsUser: 1000

  # This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
  service:
    # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
    type: ClusterIP
    # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
    port: 3306

  resources: {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

  # This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
  livenessProbe: {}
    #tcpSocket:
    #  port: 3306
    #initialDelaySeconds: 30
    #periodSeconds: 10
  readinessProbe: {}
    #tcpSocket:
    #  port: 3306
    #initialDelaySeconds: 5
    #periodSeconds: 10

  # This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80

  nodeSelector: {}

  tolerations: []

  affinity: {}

nextcloud:
  persistence:
    existingClaim: ""
    storageClass: "standard"
    accessModes:
      - ReadWriteMany
    size: 3Gi

    # Nextcloud のデータディレクトリを専用PVCへ分離
    #
    # enabled: true の場合:
    # - PVCを /var/lib/nextcloud にマウントします
    # - NEXTCLOUD_DATA_DIR=/var/lib/nextcloud/data を設定します
    #
    # enabled: false の場合:
    # - 専用PVCは使用しません
    # - デフォルトの /var/www/html/data を使用します
    data:
      enabled: true
      existingClaim: ""
      storageClass: "nfs"
      accessModes:
        - ReadWriteMany
      size: 5Gi

  secret:
  # 以下のキーはチャート側で自動設定されるため指定しないでください:
  # - MYSQL_HOST
  # - REDIS_HOST
  # - NEXTCLOUD_DATA_DIR
    # Nextcloud が DB 接続に使うパスワード
    MYSQL_PASSWORD: "nextcloud"
    # Nextcloud が利用する DB 名
    MYSQL_DATABASE: "nextcloud"
    # Nextcloud が DB 接続に使うユーザー名
    MYSQL_USER: "nextcloud"
    # Redis サービスの接続先ポート
    REDIS_HOST_PORT: "6379"
    # 初回インストール時に設定する信頼済みドメイン
    NEXTCLOUD_TRUSTED_DOMAINS: ""
    # 生成 URL のホスト名を強制
    OVERWRITEHOST: ""
    # 生成 URL のスキームを強制
    OVERWRITEPROTOCOL: ""
    # CLI 実行時に使うベース URL
    OVERWRITECLIURL: ""
    # Nextcloud をサブパス配下で公開する場合の Web ルート
    OVERWRITEWEBROOT: ""
    # 上書き設定を適用する接続元アドレス条件 (正規表現)
    OVERWRITECONDADDR: ""
    # 信頼するプロキシ IP / CIDR(スペース区切りで複数指定可能)
    TRUSTED_PROXIES: ""
    # クライアント IP を取得する転送ヘッダー名 (スペース区切りで複数指定可能)
    FORWARDED_FOR_HEADERS: ""

  # This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
  replicaCount: 1

  # This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
  image:
    repository: nextcloud
    # This sets the pull policy for images.
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: "32.0.9-apache"

  # This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
  imagePullSecrets: []
  # This is to override the chart name.
  nameOverride: ""
  fullnameOverride: ""

  # This is for setting Kubernetes Annotations to a Pod.
  # For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
  podAnnotations: {}
  # This is for setting Kubernetes Labels to a Pod.
  # For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
  podLabels: {}

  podSecurityContext: {}
    # fsGroup: 2000

  securityContext: {}
    # capabilities:
    #   drop:
    #   - ALL
    # readOnlyRootFilesystem: true
    # runAsNonRoot: true
    # runAsUser: 1000

  # This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
  service:
    # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
    type: ClusterIP
    # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
    port: 80

  resources: {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

  # This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
  livenessProbe: {}
    #httpGet:
    #  path: /
    #  port: http
  readinessProbe: {}
    #httpGet:
    #  path: /
    #  port: http

  # This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80

  nodeSelector: {}

  tolerations: []

  affinity: {}

redis:
  replicaCount: 1
  image:
    repository: redis
    # This sets the pull policy for images.
