name: tagpr

on:
  push:
    branches:
      - main
    paths:
      - "charts/**"
      - ".github/workflows/tagpr.yaml"

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  discover:
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build chart matrix
        id: set-matrix
        run: |
          charts=()

          for chart in charts/*; do
            if [[ -f "$chart/Chart.yaml" && -f "$chart/.tagpr" ]]; then
              charts+=("\"$(basename "$chart")\"")
            fi
          done

          if [[ ${#charts[@]} -eq 0 ]]; then
            echo 'matrix={"chart":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf 'matrix={"chart":[%s]}\n' "$(IFS=,; echo "${charts[*]}")" >> "$GITHUB_OUTPUT"

  tagpr:
    needs: discover

    if: ${{ fromJson(needs.discover.outputs.matrix).chart[0] != null }}

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run tagpr
        uses: Songmu/tagpr@v1
        with:
          config: charts/${{ matrix.chart }}/.tagpr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
