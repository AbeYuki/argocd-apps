name: tagpr

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "charts/**"
      - ".github/workflows/tagpr.yaml"

permissions:
  contents: write
  pull-requests: write
  issues: read

concurrency:
  group: tagpr
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Build chart matrix
        id: set-matrix
        shell: bash
        run: |
          set -euo pipefail

          charts=()

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            for chart in charts/*; do
              if [[ -f "${chart}/Chart.yaml" && -f "${chart}/.tagpr" ]]; then
                charts+=("$(basename "${chart}")")
              fi
            done
          else
            before="${{ github.event.before }}"
            after="${{ github.sha }}"

            if [[ "${before}" =~ ^0+$ ]]; then
              changed_files="$(git diff-tree --no-commit-id --name-only -r "${after}" -- charts)"
            else
              changed_files="$(git diff --name-only "${before}" "${after}" -- charts)"
            fi

            while IFS= read -r chart; do
              if [[ -n "${chart}" && -f "charts/${chart}/Chart.yaml" && -f "charts/${chart}/.tagpr" ]]; then
                charts+=("${chart}")
              fi
            done < <(
              printf '%s\n' "${changed_files}" |
                awk -F/ '$1 == "charts" && NF >= 2 {print $2}' |
                sort -u
            )
          fi

          if [[ "${#charts[@]}" -eq 0 ]]; then
            echo 'matrix={"chart":[]}' >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          printf '%s\n' "${charts[@]}" |
            jq -R . |
            jq -cs '{chart: .}' |
            sed 's/^/matrix=/' \
            >> "${GITHUB_OUTPUT}"

  tagpr:
    needs: discover

    if: ${{ fromJson(needs.discover.outputs.matrix).chart[0] != null }}

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run tagpr
        uses: Songmu/tagpr@v1
        with:
          config: charts/${{ matrix.chart }}/.tagpr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
