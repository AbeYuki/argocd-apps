name: Publish Helm charts

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "charts/**"
      - ".github/workflows/helm-pages.yaml"

permissions:
  contents: write

concurrency:
  group: helm-chart-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "${GITHUB_ACTOR}"
          git config user.email \
            "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Update chart dependencies
        shell: bash
        run: |
          set -euo pipefail

          for chart in charts/*; do
            if [[ -f "${chart}/Chart.yaml" ]]; then
              echo "Updating dependencies: ${chart}"
              helm dependency update "${chart}"
            fi
          done

      - name: Release charts
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Publish repository index under charts path
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin gh-pages

          worktree="${RUNNER_TEMP}/gh-pages"

          rm -rf "${worktree}"

          git worktree add \
            -B gh-pages \
            "${worktree}" \
            origin/gh-pages

          mkdir -p "${worktree}/charts"

          if [[ ! -f "${worktree}/index.yaml" ]]; then
            echo "::error::gh-pages/index.yaml was not generated."
            exit 1
          fi

          cp \
            "${worktree}/index.yaml" \
            "${worktree}/charts/index.yaml"

          cd "${worktree}"

          git add charts/index.yaml

          if git diff --cached --quiet; then
            echo "charts/index.yaml is already up to date."
            exit 0
          fi

          git commit -m "Update Helm repository index under charts path"
          git push origin gh-pages
