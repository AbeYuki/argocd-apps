name: Publish Helm charts

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "charts/**"
      - ".github/workflows/helm-pages.yaml"

permissions:
  contents: write

concurrency:
  group: helm-chart-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "${GITHUB_ACTOR}"
          git config user.email \
            "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Update chart dependencies
        shell: bash
        run: |
          set -euo pipefail

          chart_count=0

          for chart in charts/*; do
            if [[ -f "${chart}/Chart.yaml" ]]; then
              echo "Updating dependencies: ${chart}"
              helm dependency update "${chart}"
              chart_count=$((chart_count + 1))
            fi
          done

          if [[ "${chart_count}" -eq 0 ]]; then
            echo "::error::No Helm charts were found under charts/."
            exit 1
          fi

      - name: Release charts
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
