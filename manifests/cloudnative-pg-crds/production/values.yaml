# This application owns the complete CloudNativePG installation:
# CRDs, admission webhooks, operator, and RBAC.
config:
  clusterWide: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

monitoring:
  podMonitorEnabled: true
  podMonitorAdditionalLabels:
    release: kube-prometheus-stack

crds:
  create: true
