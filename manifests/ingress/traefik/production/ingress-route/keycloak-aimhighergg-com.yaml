apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: keycloak
  namespace: keycloak
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`keycloak.aimhighergg.com`) && (Path(`/realms/aimhighergg`) || PathPrefix(`/realms/aimhighergg/`) || PathPrefix(`/resources/`))
      kind: Rule
      priority: 100
      services:
        - name: keycloak-keycloakx-http
          port: 80
    - match: Host(`keycloak.aimhighergg.com`)
      kind: Rule
      priority: 10
      middlewares:
        - name: ip-whitelist
          namespace: keycloak
      services:
        - name: keycloak-keycloakx-http
          port: 80
  tls:
    secretName: keycloak-aimhighergg-com-tls
