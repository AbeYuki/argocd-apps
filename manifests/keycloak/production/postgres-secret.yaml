apiVersion: v1
kind: Secret
metadata:
  name: keycloak-database-credentials
  namespace: keycloak
  labels:
    cnpg.io/reload: "true"
type: kubernetes.io/basic-auth
stringData:
  # CloudNativePG requires this username to match bootstrap.initdb.owner.
  username: <path:secret/data/keycloak/database#username>
  password: <path:secret/data/keycloak/database#password>
