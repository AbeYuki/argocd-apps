replicas: 2

command:
  - /opt/keycloak/bin/kc.sh
  - start
  - --import-realm

http:
  relativePath: /

proxy:
  http:
    enabled: true

database:
  vendor: postgres
  hostname: <path:secret/data/keycloak/database#host>
  port: 5432
  database: <path:secret/data/keycloak/database#database>
  username: <path:secret/data/keycloak/database#username>
  existingSecret: keycloak-credentials

dbchecker:
  enabled: true

extraEnv: |
  - name: KC_HOSTNAME
    value: keycloak.aimhighergg.com
  - name: KC_HOSTNAME_STRICT
    value: "true"

extraEnvFrom: |
  - secretRef:
      name: keycloak-credentials

extraVolumes: |
  - name: realm
    configMap:
      name: keycloak-realm

extraVolumeMounts: |
  - name: realm
    mountPath: /opt/keycloak/data/import
    readOnly: true

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

metrics:
  enabled: true

health:
  enabled: true

serviceMonitor:
  enabled: true
  labels:
    release: kube-prometheus-stack
  interval: 30s
  scrapeTimeout: 10s

ingress:
  enabled: false
  ingressClassName: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod-dns01
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
  rules:
    - host: keycloak.aimhighergg.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - keycloak.aimhighergg.com
      secretName: keycloak-aimhighergg-com-tls
