apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: keycloak-postgres
  namespace: keycloak
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: keycloak-postgres
  podMetricsEndpoints:
    - port: metrics
      interval: 30s
      scrapeTimeout: 10s
