apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: keycloak-postgres
  namespace: keycloak-dev
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  description: PostgreSQL cluster for Keycloak
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:17.9-standard-trixie

  bootstrap:
    initdb:
      database: keycloak
      owner: keycloak
      encoding: UTF8
      secret:
        name: keycloak-database-credentials

  postgresql:
    synchronous:
      method: any
      number: 1
      dataDurability: required
      failoverQuorum: true
    parameters:
      # Keycloak uses 20 connections per replica (40 total), leaving room for
      # replication, monitoring, migrations, and administrative connections.
      max_connections: "100"

  storage:
    storageClass: longhorn
    size: 3Gi

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

  affinity:
    enablePodAntiAffinity: true
    podAntiAffinityType: required
    topologyKey: kubernetes.io/hostname
