helmCharts:
  - name: cloudnative-pg
    repo: https://cloudnative-pg.github.io/charts
    version: "0.28.1"
    namespace: keycloak-dev
    releaseName: cloudnative-pg-dev
    valuesFile: cloudnative-pg-values.yaml
  - name: keycloakx
    repo: https://codecentric.github.io/helm-charts
    version: "7.2.0"
    namespace: keycloak-dev
    releaseName: keycloak-dev
    valuesFile: keycloak-values.yaml

resources:
  - keycloak-secret.yaml
  - postgres-secret.yaml
  - postgres-cluster.yaml
  - postgres-podmonitor.yaml
  - realm-configmap.yaml
