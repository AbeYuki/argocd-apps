            repoURL: https://github.com/AbeYuki/argocd-apps.git
            path: ./manifests/avp-secret/production
            plugin: ""
            autoSync: true
            syncOptions:
              - CreateNamespace=true
          - name: rback
            namespace: argocd
            repoURL: https://github.com/AbeYuki/rbac.git
            path: ./
            plugin: ""
            autoSync: true
            syncOptions:
              - CreateNamespace=true
          - name: viteful-dev
            namespace:  <path:secret/data/viteful/dev/namespace#NAMESPACE>
            repoURL: https://github.com/AbeYuki/argocd-apps.git
            path: ./manifests/viteful/dev
            plugin: ""
            autoSync: false
            syncOptions:
              - CreateNamespace=true
          - name: viteful
            namespace:  <path:secret/data/viteful/production/namespace#NAMESPACE>
            repoURL: https://github.com/AbeYuki/argocd-apps.git
            path: ./manifests/viteful/production
            plugin: ""
