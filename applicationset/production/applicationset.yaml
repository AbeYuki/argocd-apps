            repoURL: https://github.com/AbeYuki/coredns-external-k8s.git
            path: ./
            plugin: ""
            autoSync: false
            syncOptions:
              - CreateNamespace=true
              - ServerSideApply=true
          - name: metrics-server
            namespace: kube-system
            repoURL: https://github.com/AbeYuki/argocd-apps.git
            path: ./manifests/metrics-server
            plugin: kustomize-helmcharts
            autoSync: true
            syncOptions: []
          - name: namespace
            namespace: ""
            repoURL: https://github.com/AbeYuki/namespace.git
            path: prod/
            plugin: kustomize-helmcharts
            autoSync: false
            syncOptions: []
          - name: exchangerate-exporter
