apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: applicationset
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  ignoreApplicationDifferences:
    - jsonPointers:
        - /spec/source/targetRevision
  generators:
    - list:
        elements:
          - name: keda
            repoURL: https://github.com/AbeYuki/argocd-apps.git
            path: ./manifests/keda/production
            namespace: keda
            plugin: kustomize-helmcharts
            autoSync: true
            syncOptions: 
              - CreateNamespace=true
              - ServerSideApply=true
          - name: redmine-create-ticket-webhook
            repoURL: https://github.com/AbeYuki/redmine-create-ticket-webhook-k8s.git
            path: .
            namespace: webhook
            plugin: argocd-vault-plugin-kustomize-helmcharts
            autoSync: false
            syncOptions: []
          - name: actions-runner-controller
            repoURL: https://github.com/AbeYuki/argocd-apps.git
            path: ./manifests/actions-runner-controller/production
            namespace: arc-system
            env: production
            plugin: argocd-vault-plugin-kustomize-helmcharts
            autoSync: false
            syncOptions:
              - CreateNamespace=true
              - ServerSideApply=true
          - name: argo-rollouts
            namespace: argo-rollouts
            repoURL: https://github.com/AbeYuki/argocd-apps.git
            path: ./manifests/argo-rollouts/production
            plugin: kustomize-helmcharts
