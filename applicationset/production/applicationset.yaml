              - CreateNamespace=true
          - name: nfs-provisioner-g9-enp5s0-rwo
            namespace: nfs-provisioner
            repoURL: https://github.com/AbeYuki/argocd-apps.git
            path: ./manifests/nfs-subdir-external-provisioner/g9-enp5s0-rwo
            plugin: kustomize-helmcharts
            autoSync: true
            syncOptions:
              - CreateNamespace=true
          - name: nfs-provisioner-g9-enp5s0-rwx
            namespace: nfs-provisioner
            repoURL: https://github.com/AbeYuki/argocd-apps.git
            path: ./manifests/nfs-subdir-external-provisioner/g9-enp5s0-rwx
            plugin: kustomize-helmcharts
            autoSync: true
            syncOptions:
              - CreateNamespace=true
