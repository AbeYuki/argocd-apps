              - CreateNamespace=true
          - name: metallb-config
            namespace: metallb-system
            repoURL: https://github.com/AbeYuki/argocd-apps.git
            path: ./manifests/metallb-config/production/
            plugin: ""
            autoSync: false
            syncOptions:
              - CreateNamespace=true
