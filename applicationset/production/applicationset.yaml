  template:
    metadata:
      name: "{{ .name }}"
      namespace: argocd
    spec:
      project: default
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .namespace }}"
      source:
        repoURL: "{{ .repoURL }}"
        targetRevision: HEAD
        path: "{{ .path }}"
  templatePatch: |-
    {{- if or .plugin .autoSync .syncOptions }}
    spec:
      {{- if .plugin }}
      source:
        plugin:
          name: "{{ .plugin }}"
      {{- end }}
  
      {{- if or .autoSync .syncOptions }}
      syncPolicy:
        {{- if .autoSync }}
        automated:
          prune: true
          selfHeal: true
        {{- end }}
        {{- if .syncOptions }}
        syncOptions:
        {{- range .syncOptions }}
          - {{ . }}
        {{- end }}
        {{- end }}
      {{- end }}
    {{- end }}
