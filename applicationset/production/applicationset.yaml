          - name: metallb
            namespace: metallb-system
            repoURL: https://github.com/AbeYuki/argocd-apps.git
            path: ./manifests/metallb/production/
            plugin: kustomize-helmcharts
            autoSync: false
            syncOptions:
              - CreateNamespace=true
